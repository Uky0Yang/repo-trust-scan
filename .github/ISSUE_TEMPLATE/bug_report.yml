name: Bug report
description: Report incorrect scanner behavior
title: "bug: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Do not include secrets, private source code, or sensitive paths.
  - type: input
    id: version
    attributes:
      label: Version
      placeholder: repo-trust-scan 0.1.0
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      placeholder: Windows 11, Python 3.13
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Minimal reproduction
      description: Provide a small synthetic fixture and command.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
