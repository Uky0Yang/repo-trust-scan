name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.10", "3.14"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7.0.1
      - uses: actions/setup-python@v6.3.0
        with:
          python-version: ${{ matrix.python-version }}
      - run: python -m pip install -e .
      - run: python -m unittest discover -s tests -v
      - run: python -m compileall -q repo_trust_scan tests
      # The scanner source and tests intentionally contain detector patterns.
      - run: repo-trust-scan scan . --fail-on critical
      - run: repo-trust-scan examples/risky-repo --format json --fail-on none

  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.1
      - uses: actions/setup-python@v6.3.0
        with:
          python-version: "3.12"
      - run: python -m pip install build
      - run: python -m build
      - run: python -m pip install dist/*.whl
      - run: repo-trust-scan --version

  action-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.1
      - uses: ./
        with:
          path: examples/risky-repo
          fail-on: none
          upload-sarif: "false"
          config: examples/trusted-policy.json
      - run: test -s repo-trust-scan.sarif
